services:
  db:
    image: mysql:8.4
    container_name: esiee_project_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-project_si_db}
      MYSQL_USER: ${DB_USER:-project_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-project_pass}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_pass}
      TZ: Europe/Paris
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esiee_project_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-project_si_db}
      DB_USER: ${DB_USER:-project_user}
      DB_PASSWORD: ${DB_PASSWORD:-project_pass}
      JWT_SECRET: ${JWT_SECRET:-ZmFrZS1kZXYtc2VjcmV0LWZvci10cDUuMS1yZXBsYWNlLW1lLXdpdGgtYS1yZWFsLWJhc2U2NC1rZXktYXQtbGVhc3QtMjU2LWJpdHM=}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-3600000}
    ports:
      - "8080:8080"

volumes:
  db_data_mysql:
